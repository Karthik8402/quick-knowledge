# render.yaml — Render Blueprint (Infrastructure as Code)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: quick-knowledge-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: STORAGE_BACKEND
        value: supabase
      - key: VECTOR_STORE
        value: pgvector
      - key: AUTH_ENABLED
        value: "true"
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-3.1-flash-lite
      - key: EMBEDDING_PROVIDER
        value: google
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: RAG_TOP_K
        value: "5"
      - key: RAG_CHUNK_SIZE
        value: "1000"
      - key: RAG_CHUNK_OVERLAP
        value: "200"
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
      - key: RATE_LIMIT
        value: 10/minute
      # Secrets — set these in the Render Dashboard
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
