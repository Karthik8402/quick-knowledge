name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  RUFF_VERSION: "0.15.12"
  BACKEND_TEST_ENV: "ci"

jobs:
  backend-lint:
    name: Backend / Ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Ruff
        run: python -m pip install "ruff==${{ env.RUFF_VERSION }}"

      - name: Ruff check
        run: python -m ruff check app tests --output-format=github

  backend-test:
    name: Backend / Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: "."
      GOOGLE_API_KEY: "test-key-not-real"
      LLM_PROVIDER: "google"
      LLM_MODEL: "gemini-2.5-flash"
      EMBEDDING_PROVIDER: "google"
      EMBEDDING_MODEL: "text-embedding-004"
      STORAGE_BACKEND: "local"
      VECTOR_STORE: "chroma"
      AUTH_ENABLED: "false"
      METADATA_DB_PATH: "./data/test_registry.json"
      SQLITE_DB_PATH: "./data/test_knowledge_base.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-cov

      - name: Run backend tests
        run: |
          python -m pytest tests \
            --basetemp .pytest_tmp \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  backend-typecheck:
    name: Backend / Type Check
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install mypy==1.10.0 types-requests

      - name: Mypy advisory check
        run: python -m mypy app --ignore-missing-imports --no-error-summary
        continue-on-error: true

  backend-security:
    name: Backend / Security Advisory
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install security tools
        run: python -m pip install pip-audit bandit[toml]==1.7.9

      - name: pip-audit advisory scan
        run: pip-audit -r requirements.txt --desc --format markdown
        continue-on-error: true

      - name: Bandit advisory scan
        run: |
          bandit -r app \
            -ll \
            --exclude app/__pycache__ \
            -f json \
            -o bandit-report.json
        continue-on-error: true

      - name: Upload backend security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-security-report
          path: backend/bandit-report.json
          retention-days: 7

  frontend-validate:
    name: Frontend / Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend / Tests
    runs-on: ubuntu-latest
    needs: frontend-validate
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: "http://localhost:8000"
      VITE_FRONTEND_URL: "http://localhost:5173"
      VITE_ENV: "local"
      VITE_AUTH_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        run: npm run test:ci

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-build:
    name: Frontend / Build
    runs-on: ubuntu-latest
    needs: frontend-validate
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_FRONTEND_URL: ${{ secrets.VITE_FRONTEND_URL }}
      VITE_ENV: "production"
      VITE_AUTH_ENABLED: "true"
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production bundle
        run: npm run build

      - name: Analyze bundle size
        run: |
          du -sh dist
          find dist -name "*.js" -print0 | xargs -0 wc -c | sort -n | tail -5

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  smoke-test:
    name: Smoke Test / API Contract
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: "."
      GOOGLE_API_KEY: "smoke-test-key"
      LLM_PROVIDER: "google"
      LLM_MODEL: "gemini-2.5-flash"
      EMBEDDING_PROVIDER: "google"
      EMBEDDING_MODEL: "text-embedding-004"
      STORAGE_BACKEND: "local"
      VECTOR_STORE: "chroma"
      AUTH_ENABLED: "false"
      METADATA_DB_PATH: "./data/smoke_registry.json"
      SQLITE_DB_PATH: "./data/smoke_knowledge_base.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Start API server
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "API failed to become healthy"
          cat uvicorn.log
          exit 1

      - name: Health endpoint
        run: curl -sf http://127.0.0.1:8000/health

      - name: Status endpoint
        run: curl -sf http://127.0.0.1:8000/status

      - name: Documents endpoint
        run: curl -sf http://127.0.0.1:8000/documents

      - name: Chat endpoint
        run: |
          curl -sf \
            -X POST http://127.0.0.1:8000/chat \
            -H "Content-Type: application/json" \
            -d '{"question":"Hello"}'

      - name: Stop API server
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi

  deploy-backend:
    name: Deploy / Backend to Render
    runs-on: ubuntu-latest
    needs: [backend-test, backend-security, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://intelligent-knowledge.onrender.com

    steps:
      - name: Validate Render deploy secret
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret"
            exit 1
          fi

      - name: Trigger Render deploy hook
        run: curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for Render health check
        run: |
          echo "Waiting for Render deploy..."
          sleep 120
          for i in $(seq 1 18); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://intelligent-knowledge.onrender.com/health)
            echo "Attempt $i: $status"
            if [ "$status" = "200" ]; then
              echo "Deploy healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Health check timed out"
          exit 1

  deploy-frontend:
    name: Deploy / Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://intelligent-knowledge.vercel.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Validate Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Missing Vercel secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build with Vercel
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to Vercel
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  pipeline-summary:
    name: Pipeline / Summary
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-typecheck
      - backend-test
      - backend-security
      - frontend-validate
      - frontend-test
      - frontend-build
      - smoke-test
    if: always()

    steps:
      - name: Summarize results
        run: |
          echo "## CI/CD Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Ruff | ${{ needs.backend-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Type Check | ${{ needs.backend-typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Tests | ${{ needs.backend-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Security Advisory | ${{ needs.backend-security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Type Check | ${{ needs.frontend-validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Tests | ${{ needs.frontend-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke Tests | ${{ needs.smoke-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
