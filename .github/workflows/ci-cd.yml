name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  RUFF_VERSION: "0.15.12"
  BACKEND_TEST_ENV: "ci"

jobs:
  backend-lint:
    name: Backend / Ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Ruff
        run: python -m pip install "ruff==${{ env.RUFF_VERSION }}"

      - name: Ruff check
        run: python -m ruff check app tests --output-format=github

      - name: Ruff format check
        run: python -m ruff format --check app tests

  backend-test:
    name: Backend / Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: "."
      GOOGLE_API_KEY: "test-key-not-real"
      LLM_PROVIDER: "google"
      LLM_MODEL: "gemini-3.1-flash-lite"
      EMBEDDING_PROVIDER: "google"
      EMBEDDING_MODEL: "gemini-embedding-001"
      STORAGE_BACKEND: "local"
      VECTOR_STORE: "chroma"
      AUTH_ENABLED: "false"
      METADATA_DB_PATH: "./data/test_registry.json"
      SQLITE_DB_PATH: "./data/test_knowledge_base.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest-cov

      - name: Run backend tests
        run: |
          python -m pytest tests \
            --basetemp .pytest_tmp \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  backend-typecheck:
    name: Backend / Type Check
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install mypy==1.10.0 types-requests

      - name: Mypy advisory check
        run: python -m mypy app --ignore-missing-imports --no-error-summary
        continue-on-error: true

  backend-security:
    name: Backend / Security Advisory
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install security tools
        run: python -m pip install pip-audit "bandit[toml]==1.7.9"

      - name: pip-audit advisory scan
        run: pip-audit -r requirements.txt --desc --format markdown
        continue-on-error: true

      - name: Bandit advisory scan
        run: |
          bandit -r app \
            -ll \
            --exclude app/__pycache__ \
            -f json \
            -o bandit-report.json
        continue-on-error: true

      - name: Upload backend security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-security-report
          path: backend/bandit-report.json
          retention-days: 7

  frontend-validate:
    name: Frontend / Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript type check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend / Tests
    runs-on: ubuntu-latest
    needs: frontend-validate
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: "http://localhost:8000"
      VITE_FRONTEND_URL: "http://localhost:5173"
      VITE_ENV: "local"
      VITE_AUTH_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend tests
        run: npm run test:ci

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-build:
    name: Frontend / Build
    runs-on: ubuntu-latest
    needs: frontend-validate
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env vars from Dashboard
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          # Vite reads .env.production from the project root, but vercel pull
          # downloads to .vercel/.env.production.local — copy it so Vite finds it
          if [ -f .vercel/.env.production.local ]; then
            cp .vercel/.env.production.local .env.production
            echo "Copied Vercel env vars for Vite build"
          fi

      - name: Build production bundle
        run: npm run build

      - name: Verify env vars in build output
        run: |
          echo "Checking for VITE_ vars in built bundle..."
          grep -r "VITE_SUPABASE_URL" dist/ | head -3 || echo "WARNING: VITE_SUPABASE_URL not found in bundle"
          grep -r "VITE_AUTH_ENABLED" dist/ | head -3 || echo "WARNING: VITE_AUTH_ENABLED not found in bundle"

      - name: Analyze bundle size
        run: |
          du -sh dist
          find dist -name "*.js" -print0 | xargs -0 wc -c | sort -n | tail -5

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  smoke-test:
    name: Smoke Test / API Contract
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    defaults:
      run:
        working-directory: backend
    env:
      PYTHONPATH: "."
      GOOGLE_API_KEY: "smoke-test-key"
      LLM_PROVIDER: "google"
      LLM_MODEL: "gemini-3.1-flash-lite"
      EMBEDDING_PROVIDER: "google"
      EMBEDDING_MODEL: "gemini-embedding-001"
      STORAGE_BACKEND: "local"
      VECTOR_STORE: "chroma"
      AUTH_ENABLED: "false"
      METADATA_DB_PATH: "./data/smoke_registry.json"
      SQLITE_DB_PATH: "./data/smoke_knowledge_base.db"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Start API server
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done

          echo "API failed to become healthy"
          cat uvicorn.log
          exit 1

      - name: Health endpoint
        run: curl -sf http://127.0.0.1:8000/health

      - name: Status endpoint
        run: curl -sf http://127.0.0.1:8000/status

      - name: Documents endpoint
        run: curl -sf http://127.0.0.1:8000/documents

      - name: Chat endpoint
        run: |
          curl -sf \
            -X POST http://127.0.0.1:8000/chat \
            -H "Content-Type: application/json" \
            -d '{"question":"Hello"}'

      - name: Stop API server
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi

  deploy-backend:
    name: Deploy / Backend to Render
    runs-on: ubuntu-latest
    needs: [backend-test, backend-security, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api-knowledge.karthikdev.app

    steps:
      - name: Validate Render deploy secret
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::Missing RENDER_DEPLOY_HOOK_URL secret"
            exit 1
          fi

      - name: Trigger Render deploy hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          # Render returns 200 (immediate) or 201 (queued) on success
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "::error::Render deploy hook failed with status: $response"
            exit 1
          fi
          echo "Render deploy triggered successfully (HTTP $response)"

      - name: Wait for Render health check
        run: |
          echo "Waiting for Render deploy to complete..."
          expected_sha="${{ github.sha }}"
          short_expected=$(echo "$expected_sha" | cut -c1-7)
          echo "Expected commit SHA: $expected_sha (short: $short_expected)"
          
          # Initial wait for build to start and progress
          sleep 60
          
          for i in $(seq 1 30); do
            resp=$(curl -sf https://api-knowledge.karthikdev.app/health || true)
            if [ -n "$resp" ]; then
              commit=$(echo "$resp" | jq -r '.git_commit' 2>/dev/null || echo "unknown")
              short_received=$(echo "$commit" | cut -c1-7)
              echo "Attempt $i: Active commit is $commit (short: $short_received)"
              
              if [ "$short_received" = "$short_expected" ]; then
                echo "Success! Deploy healthy and running new commit $short_expected."
                exit 0
              fi
            else
              echo "Attempt $i: Endpoint unreachable or returned an error status."
            fi
            sleep 15
          done
          echo "::error::Health check timed out waiting for commit $short_expected to deploy on Render."
          exit 1

      - name: Verify production health endpoint
        run: |
          response=$(curl -sf https://api-knowledge.karthikdev.app/health)
          echo "Health response: $response"
          echo "$response" | python3 -m json.tool

          status=$(echo "$response" | python3 -c "import sys, json; print(json.load(sys.stdin).get('status', ''))")

          if [ "$status" != "ok" ] && [ "$status" != "healthy" ]; then
            echo "::error::Backend status is '$status', expected 'ok' or 'healthy'"
            exit 1
          fi

  deploy-frontend:
    name: Deploy / Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://knowledge.karthikdev.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Validate Vercel secrets
        run: |
          missing=()
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing+=("VERCEL_TOKEN")
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing+=("VERCEL_ORG_ID")
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing+=("VERCEL_PROJECT_ID")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing Vercel secrets: ${missing[*]}"
            exit 1
          fi

      - name: Pull Vercel environment and build
        # Note: env vars are already pulled and bundled in the frontend-build job artifact.
        # Here we pull again to ensure the deploy-frontend job uses the latest dashboard values.
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          if [ -f .vercel/.env.production.local ]; then
            cp .vercel/.env.production.local .env.production
            echo "Env vars pulled from Vercel Dashboard"
          fi
          vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to Vercel
        run: |
          deploy_url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "Deploy URL: $deploy_url"

      - name: Verify frontend deployment
        run: |
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://knowledge.karthikdev.app)
            echo "Attempt $i: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Frontend deployed and accessible"
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Frontend health check timed out"

  pipeline-summary:
    name: Pipeline / Summary
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-typecheck
      - backend-test
      - backend-security
      - frontend-validate
      - frontend-test
      - frontend-build
      - smoke-test
    if: always()

    steps:
      - name: Summarize results
        run: |
          echo "## CI/CD Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Ruff | ${{ needs.backend-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Type Check | ${{ needs.backend-typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Tests | ${{ needs.backend-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend Security Advisory | ${{ needs.backend-security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Type Check | ${{ needs.frontend-validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Tests | ${{ needs.frontend-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend Build | ${{ needs.frontend-build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke Tests | ${{ needs.smoke-test.result }} |" >> "$GITHUB_STEP_SUMMARY"
