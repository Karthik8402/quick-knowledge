name: CI/CD Pipeline

# ─────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:            # Manual trigger from GitHub UI

# Cancel any in-progress run for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────
# JOB 1 — Backend Quality Gate
# ─────────────────────────────────────────────────
jobs:
  backend-lint:
    name: "Backend · Lint & Format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff==0.4.7

      - name: Ruff — check style & imports
        run: ruff check . --output-format=github

      - name: Ruff — check formatting
        run: ruff format --check .

  # ─────────────────────────────────────────────────
  backend-typecheck:
    name: "Backend · Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies + mypy
        run: |
          pip install -r requirements.txt
          pip install mypy==1.10.0 types-requests

      - name: mypy type check
        run: mypy app/ --ignore-missing-imports --no-error-summary
        continue-on-error: true   # advisory until stubs are complete

  # ─────────────────────────────────────────────────
  backend-test:
    name: "Backend · Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov pytest-asyncio anyio

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60
        env:
          PYTHONPATH: "."
          GOOGLE_API_KEY: "test-key-not-real"
          STORAGE_BACKEND: "local"
          VECTOR_STORE: "chroma"
          AUTH_ENABLED: "false"
          METADATA_DB_PATH: "./data/test_registry.json"
          SQLITE_DB_PATH: "./data/test_knowledge_base.db"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

      - name: Coverage summary comment (PRs only)
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: backend/coverage.xml
          title: "Backend Coverage Report"
        continue-on-error: true

  # ─────────────────────────────────────────────────
  backend-security:
    name: "Backend · Security Audit"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit & bandit
        run: pip install pip-audit bandit[toml]==1.7.9

      - name: pip-audit — dependency CVE scan
        run: pip-audit -r requirements.txt --desc --format markdown || true

      - name: bandit — static security analysis
        run: |
          bandit -r app/ \
            -ll \
            --exclude app/__pycache__ \
            -f json \
            -o bandit-report.json || true
          cat bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-security-report
          path: backend/bandit-report.json
          retention-days: 7

  # ─────────────────────────────────────────────────
  # JOB 2 — Frontend Quality Gate
  # ─────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: ESLint (if configured)
        run: npx eslint src/ --ext .ts,.tsx --max-warnings 0 || true

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────
  frontend-test:
    name: "Frontend · Unit Tests"
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run Vitest unit tests with coverage
        run: |
          npx vitest run \
            --reporter=verbose \
            --coverage \
            --coverage.reporter=lcov \
            --coverage.reporter=text
        env:
          VITE_API_URL: "http://localhost:8000"
          VITE_API_BASE_URL: "http://localhost:8000"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────
  frontend-build:
    name: "Frontend · Production Build"
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://intelligent-knowledge.onrender.com' }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || secrets.VITE_API_URL || 'https://intelligent-knowledge.onrender.com' }}

      - name: Analyse bundle size
        run: du -sh dist/ && find dist -name "*.js" | xargs wc -c | sort -n | tail -5

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ─────────────────────────────────────────────────
  # JOB 3 — E2E / Smoke tests (API health check)
  # ─────────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test · API contract"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend + test server
        working-directory: backend
        run: pip install -r requirements.txt httpx pytest

      - name: Start API server in background
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for server..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done
        env:
          GOOGLE_API_KEY: "smoke-test-key"
          STORAGE_BACKEND: "local"
          VECTOR_STORE: "chroma"
          AUTH_ENABLED: "false"

      - name: Health endpoint smoke test
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Status endpoint smoke test
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/status)
          echo "Status check: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Documents list smoke test
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/documents)
          echo "Documents list: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Chat endpoint smoke test
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/chat \
            -H "Content-Type: application/json" \
            -d '{"question":"Hello"}')
          echo "Chat endpoint: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

  # ─────────────────────────────────────────────────
  # JOB 4 — Deploy to Render (main branch only)
  # ─────────────────────────────────────────────────
  deploy-backend:
    name: "Deploy · Backend → Render"
    runs-on: ubuntu-latest
    needs: [backend-test, backend-security, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://intelligent-knowledge.onrender.com

    steps:
      - name: Validate Render deploy secret
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret" && exit 1
          fi

      - name: Trigger Render deploy hook
        run: |
          curl -sf \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
          || exit 1

      - name: Wait for Render health check
        run: |
          echo "Waiting 90s for Render to deploy..."
          sleep 90
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              https://intelligent-knowledge.onrender.com/health || echo "000")
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Deploy healthy!" && exit 0
            sleep 10
          done
          echo "❌ Health check timed out" && exit 1

  # ─────────────────────────────────────────────────
  # JOB 5 — Deploy Frontend to Vercel (main only)
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy · Frontend → Vercel"
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://intelligent-knowledge.vercel.app
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Validate Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Missing Vercel secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID" && exit 1
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd ./frontend

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd ./frontend

      - name: Deploy prebuilt to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --cwd ./frontend

  # ─────────────────────────────────────────────────
  # JOB 6 — Final pipeline status summary
  # ─────────────────────────────────────────────────
  pipeline-summary:
    name: "Pipeline · Summary"
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-typecheck
      - backend-test
      - backend-security
      - frontend-lint
      - frontend-test
      - frontend-build
      - smoke-test
    if: always()

    steps:
      - name: Summarize results
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Lint      | ${{ needs.backend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Typecheck | ${{ needs.backend-typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests     | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Security  | ${{ needs.backend-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Lint     | ${{ needs.frontend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests    | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build    | ${{ needs.frontend-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests       | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
